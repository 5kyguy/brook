<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brook</title>
    <link rel="stylesheet" href="/styles/main.css" />
    <script>
      try {
        const theme = localStorage.getItem("brook-theme") || "monochrome";
        document.documentElement.setAttribute("data-theme", theme);
      } catch {}
    </script>
  </head>
  <body>
    <div id="offline-banner" class="offline-banner">
      Run <code>bun run tauri:dev</code> for the full offline player.
    </div>

    <div class="app-container">
      <aside class="sidebar">
        <div class="sidebar-logo">
          <span>Brook</span>
        </div>
        <nav class="sidebar-nav main">
          <ul>
            <li class="nav-item">
              <a href="/library">Library</a>
            </li>
            <li class="nav-item">
              <a href="/search">Search</a>
            </li>
            <li class="nav-item">
              <a href="/stats">Stats</a>
            </li>
            <li class="nav-item">
              <a href="/settings">Settings</a>
            </li>
          </ul>
        </nav>
      </aside>

      <main class="main-content">
        <div id="page-library" class="page active">
          <h2 class="section-title">Library</h2>
          <p id="library-scan-status" class="scan-status"></p>
          <div id="library-track-list" class="track-list"></div>
        </div>

        <div id="page-search" class="page">
          <h2 class="section-title">Search</h2>
          <input
            id="search-input"
            class="search-box"
            type="search"
            placeholder="Search tracks, artists, albums…"
            disabled
          />
          <div id="search-results" class="placeholder-card">Search UI coming soon.</div>
        </div>

        <div id="page-stats" class="page">
          <h2 class="section-title">Stats</h2>
          <div id="stats-content" class="placeholder-card">Listening stats coming soon.</div>
        </div>

        <div id="page-settings" class="page">
          <h2 class="section-title">Settings</h2>
        </div>
      </main>

      <footer class="now-playing-bar">
        <div class="track-info">
          <img src="" alt="" class="cover" hidden />
          <div class="details">
            <div class="title">Select a song</div>
            <div class="artist"></div>
          </div>
        </div>
        <div class="player-controls">
          <div class="buttons">
            <button id="play-pause-btn" type="button" aria-label="Play">▶</button>
          </div>
          <div class="progress-container">
            <span id="current-time">0:00</span>
            <div id="progress-bar" class="progress-bar">
              <div id="progress-fill" class="progress-fill"></div>
            </div>
            <span id="total-duration">0:00</span>
          </div>
        </div>
        <div class="volume-controls">
          <div class="volume-slider-row">
            <span>Vol</span>
            <div id="volume-bar" class="volume-bar">
              <div id="volume-fill" class="volume-fill" style="width: 100%"></div>
            </div>
          </div>
        </div>
      </footer>
    </div>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
